<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      padding: 20px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: #4CAF50;
      border-radius: 12px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin: 4px 0 0 0;
    }

    .status {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #4CAF50;
    }

    .status.error {
      border-left-color: #f44336;
    }

    .status.warning {
      border-left-color: #ff9800;
    }

    .status-title {
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }

    .status-message {
      color: #666;
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 12px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #45a049;
    }

    .btn.secondary {
      background: #f5f5f5;
      color: #333;
    }

    .btn.secondary:hover {
      background: #e0e0e0;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .stats {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .stats-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }

    .stats-label {
      color: #666;
    }

    .stats-value {
      color: #333;
      font-weight: 500;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .footer a {
      color: #4CAF50;
      text-decoration: none;
      font-size: 12px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #666;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>SchemeSync</h1>
    <p class="subtitle">Autofill Assistant</p>
  </div>

  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <span>Loading...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
